services:
  whisper-api:
    build: .
    ports:
      - "127.0.0.1:8765:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    networks:
      - ai-patients-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  ai-patients-network:
    external: true
volumes:
  model_cache: